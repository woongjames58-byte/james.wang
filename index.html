  <div id="map-container"></div>
  <header class="topbar">

    <small>道路、园区主路、重要设施与工单热力</small>
  </header>

  <section class="dashboard" id="dashboardPanel">
    <div class="dashboard-head" onclick="togglePanel()">
      <h2 id="panelTitle">表盘 1 · 度假区道路恢复</h2><span id="collapseIcon">▼</span>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="dashboard1" onclick="switchDashboard('dashboard1')">① 度假区道路</button>
      <button class="tab" data-tab="dashboard2" onclick="switchDashboard('dashboard2')">② 乐园主路</button>
      <button class="tab" data-tab="dashboard3" onclick="switchDashboard('dashboard3')">③ 重要设施</button>
      <button class="tab" data-tab="dashboard4" onclick="switchDashboard('dashboard4')">④ 工单热力</button>
    </div>
    <div class="dashboard-body">
      <div class="kpis">
        <div class="kpi"><span id="kpi1Label">道路数</span><strong id="kpi1">0</strong></div>
        <div class="kpi"><span>总损失树木</span><strong id="kpiTrees">0</strong></div>
        <div class="kpi"><span id="kpi3Label">有工单位置</span><strong id="kpi3">0</strong></div>
      </div>
      <div class="dashboard-note" id="dashboardNote"></div>
      <div class="toolbar">
        <input id="searchInput" class="search" placeholder="搜索 Location 或 Location Code" oninput="renderTable()">
        <select id="sortSelect" class="sort-select" onchange="renderTable()">
          <option value="severityLoss">紧急程度 → 损失数量</option>
          <option value="loss">损失数量（高到低）</option>
          <option value="severity">紧急程度（高到低）</option>
          <option value="location">Location 名称</option>
        </select>
        <button class="small-btn" onclick="fitCurrentLayer()">显示全部</button>
      </div>
      <div class="table-wrap" id="tableWrap">
        <table>
          <thead><tr id="tableHead"></tr></thead>
          <tbody id="dashboardRows"></tbody>
        </table>
      </div>
    </div>
  </section>

  <aside class="gallery-panel" id="galleryPanel">
    <div class="gallery-head" onclick="toggleGallery()">
      <div><strong>📷 现场图片</strong><br><small id="gallerySubtitle">当前表盘全部图片</small></div>
      <span><span id="galleryCount">0</span> 张　<span id="galleryIcon">▼</span></span>
    </div>
    <div class="gallery-toolbar">
      <div class="gallery-filter" id="galleryFilter">当前表盘全部位置</div>
      <button class="gallery-clear" id="galleryClear" onclick="event.stopPropagation();clearGallerySelection()">显示全部</button>
    </div>
    <div class="gallery-list" id="galleryList"></div>
  </aside>

  <div class="legend" id="legend"></div>
  <div class="actions">
    <button class="action-btn" onclick="startReport()">📍 拍照 / 选点上报</button>
    <button class="action-btn secondary" onclick="loadIncidents()">↻ 刷新</button>
  </div>

  <div class="modal" id="reportModal">
    <div class="modal-content">
      <div class="modal-title">现场倒树上报</div>
      <div class="form-group"><label>上报人姓名 *</label><input id="reporterInput" type="text"></div>
      <div class="form-group"><label>已选坐标</label><input id="geoInput" readonly></div>
      <div class="form-group"><label>归属表盘 *</label>
        <select id="reportDashboard" onchange="handleReportDashboardChange()">
          <option value="dashboard1">1 · 度假区道路</option>
          <option value="dashboard2">2 · 乐园道路</option>
          <option value="dashboard3">3 · 重要设施</option>
        </select>
      </div>
      <div class="form-group"><label>对应 Location *</label>
        <select id="reportLocation"></select>
        <small id="nearestHint" style="display:block;color:#667085;margin-top:4px"></small>
      </div>
      <div class="form-group"><label>倒树数量（棵）</label><input id="treeCount" type="number" value="1" min="1"></div>
      <div class="form-group"><label>严重程度</label>
        <select id="severity"><option value="high">🔴 紧急</option><option value="medium" selected>🟡 中度</option><option value="low">🟢 轻微</option></select>
      </div>
      <div class="form-group"><label>现场照片</label><input id="photoInput" type="file" accept="image/*"></div>
      <div class="modal-btns"><button class="cancel" onclick="closeModal()">取消</button><button class="submit" id="submitBtn" onclick="submitReport()">提交</button></div>
    </div>
  </div>

        zoom:14.6, center:[121.658,31.1437], viewMode:"3D",
        layers:[new AMap.TileLayer(),new AMap.TileLayer.Satellite()]
      });
      const savedName=localStorage.getItem("reporter_name");
      if(savedName) document.getElementById("reporterInput").value=savedName;
      loadIncidents();
    };

    function clean(value) { return String(value ?? "").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
    function parseLocationZone(value) {
      const text=String(value||"");
      const parts=text.split("|");
      return parts[0]==="LOC" && parts.length>=5
        ? {dashboard:parts[1],code:parts[2],location:parts[3],area:parts.slice(4).join("|")}
        : null;
    }
    function incidentCode(item) {
      const direct=String(item.location_code || item.locationCode || "").trim();
      return direct || parseLocationZone(item.zone)?.code || "";
    }
    function incidentZoneLabel(item) {
      const parsed=parseLocationZone(item.zone);
      return parsed ? parsed.location : (item.zone||"未分类");
    }
    function activeItems() { return APP_DATA.dashboards[activeDashboard] || []; }
    function linkedIncidents(code) { return incidents.filter(i=>i.status!=="resolved" && incidentCode(i)===code); }
    function treesFor(code) { return linkedIncidents(code).reduce((s,i)=>s+(Number(i.count)||0),0); }
    function severityRank(value) { return ({high:3,medium:2,low:1}[value]||0); }
    function severityLabel(value) { return ({high:"紧急",medium:"中度",low:"轻微"}[value]||"无工单"); }
    function maxSeverity(code) {
      return linkedIncidents(code).reduce((best,i)=>severityRank(i.severity)>severityRank(best)?i.severity:best,"");
    }
    function severityColor(value) { return ({high:"#e74c3c",medium:"#f39c12",low:"#27ae60"}[value]||"#98a2b3"); }
    function lineColor(code) {
      const level=maxSeverity(code);
      return level ? severityColor(level) : (activeDashboard==="dashboard1" ? "#1677ff" : "#8e44ad");
    }

    async function loadIncidents() {
      try {
        const {data,error}=await db.from("incidents").select("*").order("id",{ascending:false});
        if(error) throw error;
        incidents=data||[];
      } catch(error) {
        console.error("工单读取失败",error);
        incidents=[];
      }
      renderDashboard();
    }

    function clearOverlays() {
      if(activeInfoWindow) { activeInfoWindow.close(); activeInfoWindow=null; }
      overlays.forEach(o=>map.remove(o)); overlays=[];
      if(heatmap) { heatmap.hide(); }
    }

    function switchDashboard(name) {
      activeDashboard=name;
      galleryLocationCode="";
      galleryIncidentId="";
      document.querySelectorAll(".tab").forEach(btn=>btn.classList.toggle("active",btn.dataset.tab===name));
      document.getElementById("searchInput").value="";
      renderDashboard();
    }

    function renderDashboard() {
      if(!map) return;
      clearOverlays();
      document.getElementById("panelTitle").textContent=TITLES[activeDashboard];
      document.getElementById("dashboardNote").textContent=NOTES[activeDashboard];
      if(activeDashboard==="dashboard4") renderHeatmap();
      else renderGeometryLayer();
      renderKpis();
      renderTable();
      renderLegend();
      renderGallery();
    }

    function dashboardForIncident(item) {
      const parsed=parseLocationZone(item.zone);
      if(parsed?.dashboard) return parsed.dashboard;
      const code=incidentCode(item);
      if(!code) return "";
      return Object.keys(APP_DATA.dashboards).find(name=>
        APP_DATA.dashboards[name].some(location=>location.code===code)
      ) || "";
    }

    function galleryItems() {
      return incidents.filter(item=>{
        if(!item.photo) return false;
        if(galleryIncidentId) return String(item.id)===String(galleryIncidentId);
        if(galleryLocationCode) return incidentCode(item)===galleryLocationCode;
        if(activeDashboard==="dashboard4") return true;
        return dashboardForIncident(item)===activeDashboard;
      });
    }

    function renderGallery() {
      const list=document.getElementById("galleryList");
      if(!list) return;
      const photos=galleryItems().sort((a,b)=>(Number(b.id)||0)-(Number(a.id)||0));
      const selectedItem=galleryLocationCode
        ? activeItems().find(item=>item.code===galleryLocationCode)
        : null;
      const filterText=galleryIncidentId
        ? "当前选中工单"
        : selectedItem
          ? `${selectedItem.location} (${selectedItem.code})`
          : "当前表盘全部位置";
      document.getElementById("galleryFilter").textContent=filterText;
      document.getElementById("gallerySubtitle").textContent=galleryIncidentId
        ? "选中工单的图片"
        : selectedItem ? "选中位置的全部图片" : "当前表盘全部图片";
      document.getElementById("galleryCount").textContent=photos.length;
      document.getElementById("galleryClear").style.display=(galleryLocationCode||galleryIncidentId)?"block":"none";
      list.innerHTML="";
      if(!photos.length) {
        list.innerHTML=`<div class="gallery-empty">${galleryLocationCode||galleryIncidentId?"该位置暂时没有上传图片":"当前表盘暂时没有已上传图片"}</div>`;
        return;
      }
      photos.forEach(item=>{
        const code=incidentCode(item),location=incidentZoneLabel(item);
        const card=document.createElement("article");card.className="gallery-card";
        card.innerHTML=`
          <img src="${clean(item.photo)}" alt="${clean(location)}现场图片" loading="lazy" onclick="window.open(this.src,'_blank')">
          <div class="gallery-caption">
            <b>${clean(location)}</b>${code?` · <code>${clean(code)}</code>`:""}<br>
            <span class="dot" style="background:${severityColor(item.severity)}"></span>${severityLabel(item.severity)}
           　损失 <b>${Number(item.count)||0}</b> 棵<br>
            上报人：${clean(item.reporter||"匿名")}　时间：${clean(item.time||"—")}
            ${item.status==="resolved"?"　<span class='badge'>已销项</span>":""}
          </div>`;
        list.appendChild(card);
      });
    }

    function selectGalleryLocation(code) {
      galleryLocationCode=code||"";
      galleryIncidentId="";
      renderGallery();
    }

    function selectGalleryIncident(id) {
      galleryIncidentId=String(id||"");
      galleryLocationCode="";
      renderGallery();
    }

    function clearGallerySelection() {
      galleryLocationCode="";
      galleryIncidentId="";
      renderGallery();
    }

    function toggleGallery() {
      const panel=document.getElementById("galleryPanel");
      panel.classList.toggle("collapsed");
      document.getElementById("galleryIcon").textContent=panel.classList.contains("collapsed")?"▲":"▼";
    }

    function renderGeometryLayer() {
      activeItems().forEach(item=>{
        const shape=APP_DATA.shapes[item.code];
        if(!shape) return;
        let overlay;
        if(shape.type==="path") {
          overlay=new AMap.Polyline({
            path:shape.coords, strokeColor:lineColor(item.code), strokeOpacity:.9,
            strokeWeight:treesFor(item.code)>0?8:5, lineJoin:"round", lineCap:"round",
            zIndex:60, extData:{code:item.code,role:"geometry"}
          });
        } else {
          const trees=treesFor(item.code), color=severityColor(maxSeverity(item.code));
          const size=Math.min(34,14+Math.sqrt(Math.max(trees,1))*3);
          overlay=new AMap.CircleMarker({
            center:shape.coords[0], radius:size/2, strokeColor:"#fff", strokeWeight:2,
            fillColor:color, fillOpacity:.92, zIndex:80, extData:{code:item.code,role:"geometry"}
          });
        }
        overlay.setMap(map);
        overlay.on("click",e=>showLocationInfo(item,e.lnglat || overlay.getPath?.()[0] || shape.coords[0]));
        overlays.push(overlay);

        const labelPosition=shape.type==="path"
          ? shape.coords[Math.floor(shape.coords.length/2)]
          : shape.coords[0];
        const label=new AMap.Text({
          text:item.location,
          position:labelPosition,
          anchor:shape.type==="path"?"center":"bottom-left",
          offset:shape.type==="path"?new AMap.Pixel(0,-9):new AMap.Pixel(7,-5),
          zIndex:95,
          extData:{code:item.code,role:"label"},
          style:{
            "font-size":"9px","line-height":"1.2","padding":"2px 4px",
            "border":"1px solid rgba(255,255,255,.48)","border-radius":"3px",
            "background-color":"rgba(18,40,62,.76)","color":"#fff",
            "box-shadow":"0 1px 3px rgba(0,0,0,.22)","white-space":"nowrap"
          }
        });
        label.setMap(map);
        overlays.push(label);
      });
      fitCurrentLayer(false);
    }

    function renderHeatmap() {
      const openItems=incidents.filter(i=>i.status!=="resolved" && Number(i.lng) && Number(i.lat));
      map.plugin(["AMap.HeatMap"],()=>{
        if(!heatmap) {
          heatmap=new AMap.HeatMap(map,{radius:34,opacity:[0,.86],gradient:{.2:"#3e9cff",.45:"#34c759",.7:"#ffd60a",1:"#ff3b30"}});
        }
        heatmap.setDataSet({data:openItems.map(i=>({lng:Number(i.lng),lat:Number(i.lat),count:Math.max(1,Number(i.count)||1)})),max:Math.max(1,...openItems.map(i=>Number(i.count)||1))});
        heatmap.show();
      });
      openItems.forEach(item=>{
        const marker=new AMap.CircleMarker({
          center:[Number(item.lng),Number(item.lat)],radius:5,fillColor:severityColor(item.severity),
          fillOpacity:.85,strokeColor:"#fff",strokeWeight:1,zIndex:90
        });
        marker.setMap(map);
        marker.on("click",e=>showIncidentInfo(item,e.lnglat));
        overlays.push(marker);
      });
      if(openItems.length) map.setFitView(overlays,false,[90,40,90,40],16);
    }

    function renderKpis() {
      const items=activeItems();
      const isHeat=activeDashboard==="dashboard4";
      const open=incidents.filter(i=>i.status!=="resolved");
      const treeTotal=isHeat
        ? open.reduce((s,i)=>s+(Number(i.count)||0),0)
        : items.reduce((s,item)=>s+treesFor(item.code),0);
      const linked=isHeat ? open.length : items.filter(item=>linkedIncidents(item.code).length).length;
      document.getElementById("kpi1Label").textContent=isHeat?"待处理工单":(activeDashboard==="dashboard3"?"设施点位":"道路数");
      document.getElementById("kpi1").textContent=isHeat?open.length:items.length;
      document.getElementById("kpiTrees").textContent=treeTotal;
      document.getElementById("kpi3Label").textContent=isHeat?"涉及区域":"有工单位置";
      document.getElementById("kpi3").textContent=isHeat?new Set(open.map(i=>i.zone||"未分类")).size:linked;
    }

    function renderTable() {
      const head=document.getElementById("tableHead"), body=document.getElementById("dashboardRows");
      const query=document.getElementById("searchInput").value.trim().toLowerCase();
      body.innerHTML="";
      if(activeDashboard==="dashboard4") {
        head.innerHTML="<th>区域 / 上报人</th><th>数量</th><th>程度</th><th>时间</th>";
        const sortMode=document.getElementById("sortSelect").value;
        const rows=incidents.filter(i=>i.status!=="resolved" && [incidentZoneLabel(i),incidentCode(i),i.reporter,i.time].join(" ").toLowerCase().includes(query));
        rows.sort((a,b)=>{
          if(sortMode==="loss") return (Number(b.count)||0)-(Number(a.count)||0);
          if(sortMode==="severity") return severityRank(b.severity)-severityRank(a.severity);
          if(sortMode==="location") return incidentZoneLabel(a).localeCompare(incidentZoneLabel(b),"zh-CN");
          return severityRank(b.severity)-severityRank(a.severity) || (Number(b.count)||0)-(Number(a.count)||0);
        });
        rows.forEach(item=>{
          const mappedCode=incidentCode(item);
          const tr=document.createElement("tr"); tr.className="data-row";
          tr.innerHTML=`<td>${clean(incidentZoneLabel(item))}${mappedCode?`<br><code>${clean(mappedCode)}</code>`:""}<br><small>${clean(item.reporter||"匿名")}</small></td><td><b>${Number(item.count)||0}</b> 棵</td><td><span class="dot" style="background:${severityColor(item.severity)}"></span>${clean(({high:"紧急",medium:"中度",low:"轻微"}[item.severity]||"未定"))}</td><td>${clean(item.time||"—")}</td>`;
          tr.onclick=()=>{ if(Number(item.lng)&&Number(item.lat)){map.setZoomAndCenter(18,[Number(item.lng),Number(item.lat)]);showIncidentInfo(item,[Number(item.lng),Number(item.lat)]);} };
          body.appendChild(tr);
        });
        if(!rows.length) body.innerHTML='<tr><td colspan="4" class="empty">暂无匹配的待处理工单</td></tr>';
        return;
      }
      head.innerHTML="<th>Location</th><th>Location Code</th><th>类型</th><th>紧急程度</th><th>损失</th>";
      const sortMode=document.getElementById("sortSelect").value;
      const rows=activeItems().filter(i=>(i.location+" "+i.code+" "+i.category).toLowerCase().includes(query));
      rows.sort((a,b)=>{
        const severityDiff=severityRank(maxSeverity(b.code))-severityRank(maxSeverity(a.code));
        const lossDiff=treesFor(b.code)-treesFor(a.code);
        if(sortMode==="loss") return lossDiff || severityDiff;
        if(sortMode==="severity") return severityDiff || lossDiff;
        if(sortMode==="location") return a.location.localeCompare(b.location,"zh-CN");
        return severityDiff || lossDiff || a.location.localeCompare(b.location,"zh-CN");
      });
      rows.forEach(item=>{
        const shape=APP_DATA.shapes[item.code], trees=treesFor(item.code), level=maxSeverity(item.code);
        const tr=document.createElement("tr"); tr.className="data-row";
        tr.innerHTML=`<td>${clean(item.location)}${item.category?`<br><small>${clean(item.category)}</small>`:""}</td><td><code>${clean(item.code)}</code></td><td><span class="badge">${shape.type==="path"?"线":"点"}</span></td><td><span class="dot" style="background:${severityColor(level)}"></span>${severityLabel(level)}</td><td><b>${trees||"—"}</b></td>`;
        tr.onclick=()=>focusLocation(item.code);
        body.appendChild(tr);
      });
      if(!rows.length) body.innerHTML='<tr><td colspan="5" class="empty">没有匹配的位置</td></tr>';
    }

    function renderLegend() {
      document.getElementById("legend").innerHTML=activeDashboard==="dashboard4"
        ? '<b>热力密度</b><br><span class="dot" style="background:#3e9cff"></span>较少　<span class="dot" style="background:#ffd60a"></span>较多　<span class="dot" style="background:#ff3b30"></span>集中'
        : '<b>工单严重程度</b><br><span class="dot" style="background:#e74c3c"></span>紧急　<span class="dot" style="background:#f39c12"></span>中度　<span class="dot" style="background:#27ae60"></span>轻微　<span class="dot" style="background:#98a2b3"></span>无关联工单';
    }

    function focusLocation(code) {
      const target=overlays.find(o=>o.getExtData?.()?.code===code && o.getExtData?.()?.role==="geometry");
      const item=activeItems().find(i=>i.code===code), shape=APP_DATA.shapes[code];
      if(!target||!shape) return;
      if(shape.type==="path") {
        map.setFitView([target],false,[100,80,100,420],17);
        target.setOptions({strokeWeight:10,strokeColor:"#ff3b30"});
        setTimeout(()=>target.setOptions({strokeWeight:treesFor(code)>0?8:5,strokeColor:lineColor(code)}),1200);
        showLocationInfo(item,shape.coords[Math.floor(shape.coords.length/2)]);
      } else {
        map.setZoomAndCenter(18,shape.coords[0]);
        showLocationInfo(item,shape.coords[0]);
      }
    }

    function showLocationInfo(item,position) {
      selectGalleryLocation(item.code);
      const linked=linkedIncidents(item.code), trees=treesFor(item.code);
      activeInfoWindow=new AMap.InfoWindow({content:`<div style="padding:8px;line-height:1.65;font-size:12px"><b>${clean(item.location)}</b><br>Location Code: <code>${clean(item.code)}</code><br>几何类型: ${item.shapeType==="path"?"线段":"点位"}<br>关联待处理工单: ${linked.length}<br>总损失树木: ${trees||0}</div>`,offset:new AMap.Pixel(0,-8)});
      activeInfoWindow.open(map,position);
    }

    function showIncidentInfo(item,position) {
      const code=incidentCode(item);
      if(activeDashboard==="dashboard4") selectGalleryIncident(item.id);
      else if(code) selectGalleryLocation(code);
      const severity=({high:"🔴 紧急",medium:"🟡 中度",low:"🟢 轻微"}[item.severity]||"未定");
      const photo=item.photo?`<img src="${clean(item.photo)}" style="width:100%;max-height:130px;object-fit:cover;margin-top:6px;border-radius:5px">`:"";
      activeInfoWindow=new AMap.InfoWindow({content:`<div style="padding:8px;line-height:1.6;font-size:12px;max-width:230px"><b>树木风险工单</b><br>位置: ${clean(incidentZoneLabel(item))}${code?`<br>Location Code: <code>${clean(code)}</code>`:""}<br>数量: <b>${Number(item.count)||0}</b> 棵<br>程度: ${severity}<br>上报人: ${clean(item.reporter||"匿名")}<br>时间: ${clean(item.time||"—")}${photo}<button onclick="resolveIncident('${clean(item.id)}')" style="width:100%;margin-top:7px;border:0;border-radius:5px;padding:6px;background:#27ae60;color:#fff">已处理（销项）</button></div>`,offset:new AMap.Pixel(0,-8)});
      activeInfoWindow.open(map,position);
    }

      map.setFitView(targets,false,[90,40,90,activeDashboard==="dashboard4"?40:420],16);

    function startReport() {
      const reportDashboard=["dashboard1","dashboard2","dashboard3"].includes(activeDashboard)?activeDashboard:"dashboard1";
      document.getElementById("reportDashboard").value=reportDashboard;
      populateReportLocations();

    function populateReportLocations(preferredCode="") {
      const dashboard=document.getElementById("reportDashboard").value;
      const select=document.getElementById("reportLocation");
      select.innerHTML="";
      (APP_DATA.dashboards[dashboard]||[]).forEach(item=>{
        const option=document.createElement("option");
        option.value=item.code;
        option.textContent=`${item.location} (${item.code})`;
        option.dataset.location=item.location;
        option.dataset.area=item.area||item.category||"";
        select.appendChild(option);
      });
      if(preferredCode && [...select.options].some(o=>o.value===preferredCode)) select.value=preferredCode;
    }
    function handleReportDashboardChange() {
      const dashboard=document.getElementById("reportDashboard").value;
      const nearest=tempLngLat ? nearestLocation(dashboard,tempLngLat) : null;
      populateReportLocations(nearest?.item.code || "");
      document.getElementById("nearestHint").textContent=nearest
        ? `已按新分类重新匹配：${nearest.item.location}，距离约 ${Math.round(nearest.distance)} 米；如不正确可手动更改。`
        : "";
    }
    function pointSegmentDistance(point,a,b) {
      const lat0=point[1]*Math.PI/180, mx=111320*Math.cos(lat0), my=110540;
      const px=(point[0]-a[0])*mx, py=(point[1]-a[1])*my;
      const bx=(b[0]-a[0])*mx, by=(b[1]-a[1])*my;
      const denom=bx*bx+by*by;
      const t=denom?Math.max(0,Math.min(1,(px*bx+py*by)/denom)):0;
      return Math.hypot(px-t*bx,py-t*by);
    }
    function nearestLocation(dashboard,lnglat) {
      const point=[lnglat.getLng(),lnglat.getLat()];
      let best=null;
      (APP_DATA.dashboards[dashboard]||[]).forEach(item=>{
        const shape=APP_DATA.shapes[item.code];
        let distance=Infinity;
        if(shape.type==="point") {
          distance=pointSegmentDistance(point,shape.coords[0],shape.coords[0]);
        } else {
          for(let i=1;i<shape.coords.length;i++) distance=Math.min(distance,pointSegmentDistance(point,shape.coords[i-1],shape.coords[i]));
        }
        if(!best||distance<best.distance) best={item,distance};
      });
      return best;
    }
    function onMapClick(e) {
      if(!isSelecting)return;
      tempLngLat=e.lnglat; isSelecting=false; map.off("click",onMapClick);
      document.getElementById("geoInput").value=`${tempLngLat.getLng().toFixed(6)}, ${tempLngLat.getLat().toFixed(6)}`;
      const dashboard=document.getElementById("reportDashboard").value;
      const nearest=nearestLocation(dashboard,tempLngLat);
      if(nearest) {
        populateReportLocations(nearest.item.code);
        document.getElementById("nearestHint").textContent=`已自动匹配最近位置：${nearest.item.location}，距离约 ${Math.round(nearest.distance)} 米；如不正确可手动更改。`;
      }
      document.getElementById("reportModal").style.display="flex";
    }

    function fileToBase64(file) {
      return new Promise((resolve,reject)=>{
        const reader=new FileReader();
        reader.onload=e=>{
          const image=new Image();
          image.onload=()=>{
            const canvas=document.createElement("canvas"),scale=Math.min(500/image.width,1);
            canvas.width=Math.round(image.width*scale);canvas.height=Math.round(image.height*scale);
            canvas.getContext("2d").drawImage(image,0,0,canvas.width,canvas.height);
            resolve(canvas.toDataURL("image/jpeg",.6));
          };
          image.onerror=reject; image.src=e.target.result;
        };
        reader.onerror=reject;reader.readAsDataURL(file);
      });
    }
    async function submitReport() {
      const reporter=document.getElementById("reporterInput").value.trim();
      if(!reporter||!tempLngLat){alert("请填写上报人并选择位置。");return;}
      localStorage.setItem("reporter_name",reporter);
      const button=document.getElementById("submitBtn");button.disabled=true;button.textContent="上传中…";
      try {
        const file=document.getElementById("photoInput").files[0];
        const photo=file?await fileToBase64(file):"";
        const now=new Date(),time=`${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")} ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
        const dashboard=document.getElementById("reportDashboard").value;
        const locationSelect=document.getElementById("reportLocation");
        const selected=locationSelect.options[locationSelect.selectedIndex];
        if(!selected) throw new Error("请选择对应 Location");
        const locationCode=selected.value,locationName=selected.dataset.location,area=selected.dataset.area||"";
        // Encode the mapping in the existing zone column so this works with the current
        // Supabase schema without requiring a database migration.
        const mappedZone=["LOC",dashboard,locationCode,locationName,area].join("|");
        const {error}=await db.from("incidents").insert([{
          lng:tempLngLat.getLng(),lat:tempLngLat.getLat(),zone:mappedZone,
          count:Number(document.getElementById("treeCount").value)||1,severity:document.getElementById("severity").value,
          time,photo,status:"todo",reporter
        }]);
        if(error)throw error;
        closeModal();await loadIncidents();switchDashboard(dashboard);alert(`上传成功，已关联到 ${locationName} (${locationCode})`);
      } catch(error) { alert("保存失败："+error.message); }
      finally { button.disabled=false;button.textContent="提交"; }
    }
    async function resolveIncident(id) {
      if(!confirm("确定该工单已处理完毕吗？"))return;
      try {
        const {error}=await db.from("incidents").update({status:"resolved"}).eq("id",id);
        if(error)throw error;map.clearInfoWindow();await loadIncidents();
      } catch(error) { alert("销项失败："+error.message); }
    }
  </script>
